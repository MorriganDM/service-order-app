name: service-order-app

services:
  db:
    image: postgres:16-alpine
    container_name: service_orders_db
    environment:
      POSTGRES_USER: service_orders_user
      POSTGRES_PASSWORD: service_orders_password
      POSTGRES_DB: service_orders_db
    ports:
      - "5433:5432"
    volumes:
      - service_orders_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U service_orders_user -d service_orders_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
    container_name: service_orders_api
    environment:
      DATABASE_URL: postgresql+psycopg://service_orders_user:service_orders_password@db:5432/service_orders_db
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  service_orders_postgres_data:
